name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.1)'
        required: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          }
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Update version in project file
        shell: pwsh
        run: |
          $csproj = "CustomerManager/CustomerManager.csproj"
          (Get-Content $csproj) -replace '<Version>.*</Version>', "<Version>$env:VERSION</Version>" | Set-Content $csproj
          (Get-Content $csproj) -replace '<AssemblyVersion>.*</AssemblyVersion>', "<AssemblyVersion>$env:VERSION.0</AssemblyVersion>" | Set-Content $csproj
          (Get-Content $csproj) -replace '<FileVersion>.*</FileVersion>', "<FileVersion>$env:VERSION.0</FileVersion>" | Set-Content $csproj

      - name: Publish application
        run: |
          dotnet publish CustomerManager/CustomerManager.csproj `
            --configuration Release `
            --framework net10.0-windows `
            --runtime win-x64 `
            --self-contained true `
            --output publish_output

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup install failed" }

      - name: Update ISS script version
        shell: pwsh
        run: |
          $iss = "CustomerManager.iss"
          (Get-Content $iss) -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$env:VERSION`"" | Set-Content $iss

      - name: Update version.xml
        shell: pwsh
        run: |
          $date = (Get-Date).ToString("yyyy-MM-dd")
@"<?xml version="1.0" encoding="utf-8"?>
<ApplicationUpdate>
  <Version>$env:VERSION</Version>
  <ReleaseDate>$date</ReleaseDate>
  <Description>Auto-built release v$env:VERSION</Description>
  <DownloadUrl>https://github.com/Bibash-Basnet/CustomerManager/releases/download/v$env:VERSION/CustomerManager-Setup-v$env:VERSION.exe</DownloadUrl>
  <Mandatory>false</Mandatory>
</ApplicationUpdate>"@ | Out-File -FilePath "version.xml" -Encoding utf8

      - name: Commit version.xml update
        shell: pwsh
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add version.xml
          git diff --quiet && git diff --staged --quiet || git commit -m "Update version.xml to v$env:VERSION"
          git push

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" CustomerManager.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CustomerManager-Setup-v${{ env.VERSION }}
          path: Output/CustomerManager-Setup-v${{ env.VERSION }}.exe

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Customer Manager v${{ env.VERSION }}
          body: |
            ## Customer Manager v${{ env.VERSION }}

            ### Changes in this release:
            See the commit history for detailed changes.

            ### Installation
            1. Download `CustomerManager-Setup-v${{ env.VERSION }}.exe`
            2. Run the installer
            3. Launch Customer Manager from Start Menu or Desktop
          files: |
            Output/CustomerManager-Setup-v${{ env.VERSION }}.exe
          draft: false
          prerelease: false
